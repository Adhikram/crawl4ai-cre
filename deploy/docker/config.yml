# Application Configuration
app:
  title: "Crawl4AI API"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 11235
  reload: False
  workers: 4        # NOTE: this value is NOT read by gunicorn — worker count is set in supervisord.conf --workers flag
  timeout_keep_alive: 300

# Default LLM Configuration
llm:
  provider: "openai/gpt-4o-mini"
  # api_key: sk-...  # If you pass the API key directly (not recommended)

# Redis Configuration
# Set task_ttl_seconds to automatically expire task data in Redis.
# This prevents unbounded memory growth from accumulated task results.
# Default: 3600 (1 hour). Set to 0 to disable TTL (not recommended).
# Can be overridden with REDIS_TASK_TTL environment variable.
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""
  task_ttl_seconds: 172800  # TTL for task data (2 days — long enough for slow poll cycles)
  ssl: False
  ssl_cert_reqs: None
  ssl_ca_certs: None
  ssl_certfile: None
  ssl_keyfile: None

# Rate Limiting Configuration
rate_limiting:
  enabled: True
  default_limit: "1000/minute"
  trusted_proxies: []
  storage_uri: "memory://"  # Use "redis://localhost:6379" for production

# Security Configuration
# WARNING: For production deployments, enable security and use proper SECRET_KEY:
#   - Set jwt_enabled: true for authentication
#   - Set SECRET_KEY environment variable to a secure random value
#   - Set CRAWL4AI_HOOKS_ENABLED=true only if you need hooks (RCE risk)
security:
  enabled: true
  jwt_enabled: true
  # REQUIRED: set API_TOKEN env var — callers must send this to obtain a JWT.
  # Generate with: openssl rand -hex 32
  api_token: ""  # Overridden by API_TOKEN environment variable (see server startup)
  https_redirect: false
  trusted_hosts: ["*"]
  # Only emails from these domains can obtain tokens.
  # Empty list = allow any domain with valid DNS MX records (not recommended for production).
  allowed_email_domains: ["anaxrep.com"]
  headers:
    x_content_type_options: "nosniff"
    x_frame_options: "DENY"
    content_security_policy: "default-src 'self'"
    strict_transport_security: "max-age=63072000; includeSubDomains"

# Crawler Configuration
# Machine: 94GB RAM, 18 CPU cores
# Each Chromium browser ~300-500MB RSS in text_mode (no GPU, no images)
# Budget: 88GB container limit x 85% threshold = ~75GB usable before throttle
# At ~400MB/browser -> ~187 browsers theoretical max; 150 is a safe ceiling
crawler:
  base_config:
    simulate_user: true
  memory_threshold_percent: 85.0   # Throttle at 85% of 88GB ~75GB; leaves buffer before OOM
  rate_limiter:
    enabled: true
    base_delay: [0.5, 1.0]         # Reduced from [1.0, 2.0] — big machine handles faster pacing
  timeouts:
    stream_init: 30.0
    batch_process: 300.0
  pool:
    max_pages: 150                  # GLOBAL_SEM concurrent browser pages (was 40)
    idle_ttl_sec: 600               # Keep warm browsers alive longer (was 300s)
  browser:
    kwargs:
      headless: true
      text_mode: true
    extra_args:
      - "--no-sandbox"
      - "--disable-dev-shm-usage"   # Use /tmp instead of /dev/shm (reliable in Docker)
      - "--disable-gpu"
      - "--disable-software-rasterizer"
      - "--disable-web-security"
      - "--allow-insecure-localhost"
      - "--ignore-certificate-errors"
      - "--js-flags=--max-old-space-size=512"  # Cap V8 heap per tab to 512MB

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Observability Configuration
observability:
  prometheus:
    enabled: True
    endpoint: "/metrics"
  health_check:
    endpoint: "/health"

# Webhook Configuration
webhooks:
  enabled: true
  default_url: null  # Optional: default webhook URL for all jobs
  data_in_payload: false  # Optional: default behavior for including data
  retry:
    max_attempts: 5
    initial_delay_ms: 1000  # 1s, 2s, 4s, 8s, 16s exponential backoff
    max_delay_ms: 32000
    timeout_ms: 30000  # 30s timeout per webhook call
  headers:  # Optional: default headers to include
    User-Agent: "Crawl4AI-Webhook/1.0"
